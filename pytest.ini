[pytest]
testpaths = tests
python_files = test_*.py
pythonpath = .
addopts = -ra --strict-markers
markers =
    slow: tests that load TensorFlow models (deselect with -m "not slow")
    integration: end-to-end API tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
